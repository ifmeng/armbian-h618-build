# H618 机顶盒通用配置
BOARD_NAME="H618-STB"
BOARD_FAMILY="sun50i-h6"
BOARD_TYPE="tvbox"
KERNEL_TARGET="current"
LIBREELEC_ARCH="arm64"
DEFAULT_OVERLAY_PREFIX="sun50i-h618"

# 内核配置
BOOTCONFIG="sun50i_h6_defconfig"
MODULES="rtl8188eu rtl8821cu rtw88_8822bu"
MODULES_BLACKLIST=""

# 串口配置（H618机顶盒通用115200波特率）
SERIALCON="ttyS0,115200"

# 存储配置
DEFAULT_POWERDEV="/dev/mmcblk0"
DEFAULT_ROOTDEV="/dev/mmcblk0p2"
IMAGE_PARTITION_TABLE="msdos"
